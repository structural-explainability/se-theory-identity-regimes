# ============================================================
# SE_MANIFEST.toml (Repository Declaration)
# se-theory-identity-regimes
# ============================================================

schema = "se-manifest-2"
schema_url = "https://raw.githubusercontent.com/structural-explainability/se-manifest-schema/v0.2.0/manifest-schema.toml"

# === Identity ===

[meta]
purpose = "Declares the identity-regimes theory repository for the Structural Explainability ecosystem."

[repo]
name = "se-theory-identity-regimes"
org = "structural-explainability"
class = "theory"
kind = "foundation"
status = "active"
since = "2026"
summary = "Lean 4 formalization of the six identity regimes, their requirement structure, and derived regime-profile structure over admissible neutral substrates."

[layer]
space = "formal-theory"
role = "theory"

# === Dependencies ===

[depends]
# Required upstream repository dependencies.
required = [
  "se-theory-neutral-substrate",
]

# Optional upstream repository dependencies.
optional = []

# === Provided artifacts ===

[provides]
# Logical artifacts exposed by this repository.
# These are stable identifiers, not file paths.
artifacts = [
  "lean-library",
  "theorem-set",
  "regime-classification-matrix",
  "regime-classification-values",
  "regime-families",
  "regime-profile-derivation",
  "regime-profiles",
  "regime-transformations",
]

# === Scope ===

[scope]
includes = [
  "six canonical identity regimes (OBL, NOR, OCC, CTX, REC, ENR)",
  "regime requirement structure",
  "regime-profile structure",
  "admissibility conditions for regime application over neutral substrates",
  "necessity and sufficiency theorem structure",
  "machine-checked Lean theorems",
  "machine-readable reference artifacts for transformation and classification layers",
]

excludes = [
  "neutral substrate primitives",
  "substrate well-formedness",
  "substrate separation constraints",
  "persistence behavior",
  "mapping semantics",
  "operational validation logic",
  "repository governance rules",
  "schema definitions for other repositories",
  "domain-specific mappings or data",
  "runtime systems",
]

# === Validation ===

[validation]
# no runtime entrypoint; validation occurs via Lean build/check
entrypoint = "none"

# === Behavior / governance ===

[naming]
pattern = "se-theory-*"

[governance]
authority = "structural-explainability"

# === External references ===

[citation]
cff = "CITATION.cff"
preferred = "CITATION.cff"

[traceability]
identifier_map = "reference/index.toml"
