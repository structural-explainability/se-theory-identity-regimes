# regime-profile-derivation.toml
# Explains the structural reason for splits,
# not the full theory behind them.

[meta]
source = "se-theory-identity-regimes"
namespace = "se.identity-regimes"
artifact = "regime-profile-derivation"
version = "0.1.0"
status = "canonical"

# === Regime Profile Derivations ===

[derivation.OBL]
family = "OBL"
split = false
profiles = ["OBL"]
description = "No split: obligation-bearing entities admit a single stable identity regime under the transformation basis."

[derivation.OCC]
family = "OCC"
split = false
profiles = ["OCC"]
description = "No split: time-indexed occurrences are uniquely determined by occurrence identity without competing persistence interpretations."

[derivation.REC]
family = "REC"
split = false
profiles = ["REC"]
description = "No split: descriptive records preserve identity through representation without requiring alternative regime interpretations."

[derivation.ENR]
family = "ENR"
split = true
profiles = ["ENR_L", "ENR_I"]
description = "Split required: enduring non-normative referents admit multiple persistence interpretations (e.g., locus-bound vs instrument-bound)."

[derivation.CTX]
family = "CTX"
split = true
profiles = ["CTX_E", "CTX_S"]
description = "Split required: applicability contexts differentiate based on the binding axis (event-bound vs scope-bound)."

[derivation.NOR]
family = "NOR"
split = true
profiles = ["NOR_C", "NOR_S"]
description = "Split required: normative structures separate along context-bound and scope-bound applicability regimes."
