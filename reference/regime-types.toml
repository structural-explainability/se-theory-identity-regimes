# ============================================================
# Regime Types
# se-theory-identity-regimes
# ============================================================

schema = "se-regime-type-registry-1"
repo = "se-theory-identity-regimes"
surface_module = "IdentityRegimes.Surface"
namespace = "IdentityRegimes"

[type.Regime]
id = "Regime"
cite_id = "IR.TYPE.Regime"
name = "Regime"
lean_symbol = "Regime"
source_module = "IdentityRegimes.Vocab.Basic"
description = "The six canonical identity regimes: OBL, NOR, OCC, CTX, REC, ENR. Each regime represents a distinct identity-bearing role that a subject may occupy within a structural explainability context."

[type.RegimeProfile]
id = "RegimeProfile"
cite_id = "IR.TYPE.RegimeProfile"
name = "Regime profile"
lean_symbol = "RegimeProfile"
source_module = "IdentityRegimes.Profile.Core"
description = "A derived regime profile identified by its RegimeProfileKind. A profile is well-formed when its parent regime is canonical. The nine profiles refine the six canonical regimes under split pressure."

[type.RegimeProfileKind]
id = "RegimeProfileKind"
cite_id = "IR.TYPE.RegimeProfileKind"
name = "Regime profile kind"
lean_symbol = "RegimeProfileKind"
source_module = "IdentityRegimes.Profile.Core"
description = "The nine derived regime profile kinds: OBL, OCC, REC, ENR_L, ENR_I, CTX_E, CTX_S, NOR_C, NOR_S. OBL/OCC/REC carry no split pressure; ENR/CTX/NOR each split into two profiles under their respective split-forcing transformations."

[type.Requirement]
id = "Requirement"
cite_id = "IR.TYPE.Requirement"
name = "Requirement"
lean_symbol = "Requirement"
source_module = "IdentityRegimes.Vocab.Requirements"
description = "A requirement associated with applying a regime over a substrate. Carries the regime to which the requirement belongs."

[type.Transformation]
id = "Transformation"
cite_id = "IR.TYPE.Transformation"
name = "Transformation"
lean_symbol = "Transformation"
source_module = "IdentityRegimes.Vocab.TransformBasis"
description = "The ten-element fixed transformation basis: RE, AN, RF, AD, RC, RA, SU, BF, SE, PV. Each transformation is classified under every regime profile as IGN, PRS, BRK, or NA."

[type.ClassificationValue]
id = "ClassificationValue"
cite_id = "IR.TYPE.ClassificationValue"
name = "Transformation classification value"
lean_symbol = "ClassificationValue"
source_module = "IdentityRegimes.Vocab.TransformBasis"
description = "The canonical classification values for transformation behavior under a regime profile: IGN (identity-ignoring), PRS (identity-preserving), or BRK (identity-breaking). Maps every (RegimeProfileKind, Transformation) pair to exactly one value."

[type.IdentityBasis]
id = "IdentityBasis"
cite_id = "IR.TYPE.IdentityBasis"
name = "Identity basis"
lean_symbol = "IdentityBasis"
source_module = "IdentityRegimes.Profile.Core"
description = "The six identity basis kinds: single, content, structure, extension, locus, instrument. Each derived profile is assigned a canonical identity basis via RegimeProfileKind.axes."

[type.ProfileAxes]
id = "ProfileAxes"
cite_id = "IR.TYPE.ProfileAxes"
name = "Profile axes"
lean_symbol = "ProfileAxes"
source_module = "IdentityRegimes.Profile.Core"
description = "The canonical axes of a regime profile: an identity basis and a split transformation. Each RegimeProfileKind maps to a unique ProfileAxes via RegimeProfileKind.axes."
