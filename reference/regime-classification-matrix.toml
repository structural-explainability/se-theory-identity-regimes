# regime-classification-matrix.toml
# The 9 × 10 canonical classification matrix assigning IGN/PRS/BRK
# to every (RegimeProfileKind, Transformation) pair.
#
# Source: SE-300 Section 4 canonical classification tables and
#         Sections 5.1-5.3 regime refinement definitions.
#
# N/A entries from the paper are mapped to IGN:
#   "not applicable" is semantically equivalent to
#   "identity question does not arise" (IGN).
#
# Affected N/A→IGN cells:
#   OCC.RA, OCC.BF  (time-indexed occurrences admit no bearer reassignment or forking)
#   ENR-L.RA, ENR-I.RA  (enduring referents: RA not applicable)
#   CTX-E.SE, CTX-S.SE  (normative structures do not undergo state evolution)
#   NOR-C.SE, NOR-S.SE  (normative structures do not undergo state evolution)
#
# Universal columns:
#   RE → IGN for all profiles  (re-expression does not affect identity)
#   SU → BRK for all profiles  (substitution replaces the identity carrier)
#
# Verified counts: PRS=22, BRK=20, IGN=48, total=90.
# The REC × PV cell (PRS) was disputed and resolved:
# provenance-tracking bridges the identity break in recovery.

[meta]
source = "se-theory-identity-regimes"
namespace = "se.identity-regimes"
artifact = "regime-classification-matrix"
version = "0.2.0"
status = "canonical"


# ---------------------------------------------------------------
# Row: OBL  (Obligation-bearing entity)
# Identity constituted by persistence as a responsible party.
# BF=IGN: obligation persists independently of representation forking.
# SE=IGN: identity not individuated by internal state transitions.
# ---------------------------------------------------------------

[matrix.OBL.RE]
value = "IGN"
basis = "axiomatic"
note = "Re-expression does not affect identity."

[matrix.OBL.AN]
value = "IGN"
basis = "paper-definition"
note = "Annotation adds non-identity-bearing information."

[matrix.OBL.RF]
value = "PRS"
basis = "paper-definition"
note = "Refinement preserves obligation identity."

[matrix.OBL.AD]
value = "PRS"
basis = "paper-definition"
note = "Decomposition preserves obligation identity."

[matrix.OBL.RC]
value = "IGN"
basis = "paper-definition"
note = "Re-contextualization does not affect obligation identity."

[matrix.OBL.RA]
value = "IGN"
basis = "paper-definition"
note = "Reassignment does not affect obligation identity."

[matrix.OBL.SU]
value = "BRK"
basis = "axiomatic"
note = "Substitution replaces the identity carrier."

[matrix.OBL.BF]
value = "IGN"
basis = "paper-definition"
note = "Obligation-bearing entity persists independently of forking."

[matrix.OBL.PV]
value = "IGN"
basis = "paper-definition"
note = "Provenance extension does not affect obligation identity."

[matrix.OBL.SE]
value = "IGN"
basis = "paper-definition"
note = "State evolution does not individuate obligation-bearing entities."


