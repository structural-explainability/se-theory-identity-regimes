# regime-classification-matrix.toml
# The 9 × 10 classification matrix assigning IGN/PRS/BRK
# to every (RegimeProfileKind, Transformation) pair.
#
# Axiomatic cells (derivable from transformation semantics alone):
#   RE → PRS for all profiles  (retaining exact identity preserves it)
#   BF → BRK for all profiles  (breaking identity breaks it)
#
# All other cells are theoretical — marked status = "draft".

[meta]
source = "se-theory-identity-regimes"
namespace = "se.identity-regimes"
artifact = "regime-classification-matrix"
version = "0.1.0"
status = "draft"


# ---------------------------------------------------------------
# Row: OBL  (Obligation-bearing entity)
# Identity is constituted by the normative binding relation.
# ---------------------------------------------------------------

[matrix.OBL.RE]
value = "PRS"
basis = "axiomatic"

[matrix.OBL.AN]
value = "PRS"
basis = "draft"
note = "Obligation identity is not label-dependent."

[matrix.OBL.RF]
value = "PRS"
basis = "draft"
note = "Refinement preserves normative binding."

[matrix.OBL.AD]
value = "PRS"
basis = "draft"
note = "Format adaptation preserves obligation identity."

[matrix.OBL.RC]
value = "BRK"
basis = "draft"
note = "Reclassification changes normative status."

[matrix.OBL.RA]
value = "BRK"
basis = "draft"
note = "Obligation is constituted by its associations; reassignment breaks it."

[matrix.OBL.SU]
value = "BRK"
basis = "draft"
note = "Substitution replaces the entity."

[matrix.OBL.BF]
value = "BRK"
basis = "axiomatic"

[matrix.OBL.SE]
value = "BRK"
basis = "draft"
note = "Obligation identity is not decomposable."

[matrix.OBL.PV]
value = "IGN"
basis = "draft"
note = "Projection does not affect the source obligation."


