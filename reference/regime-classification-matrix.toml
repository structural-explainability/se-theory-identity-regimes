basis = "paper-definition"
note = "Decomposition produces sub-occurrences with distinct temporal individuation."

[matrix.OCC.RC]
value = "IGN"
basis = "paper-definition"
note = "Re-contextualization does not affect occurrence identity."

[matrix.OCC.RA]
value = "IGN"
basis = "na-to-ign"
note = "N/A→IGN. Occurrence is fixed by realization event; bearer reassignment inapplicable."

[matrix.OCC.SU]
value = "BRK"
basis = "axiomatic"
note = "Substitution replaces the identity carrier."

[matrix.OCC.BF]
