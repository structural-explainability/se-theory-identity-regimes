[theorem.all_regimes_canonical]
id = "all_regimes_canonical"
cite_id = "IR.THEOREM.all_regimes_canonical"
name = "All regimes canonical"
lean_symbol = "all_regimes_canonical"
source_module = "IdentityRegimes.Vocab.Regimes"
status = "proved"
description = "Every declared Regime satisfies IsCanonicalRegime. Follows trivially from the intentionally minimal definition of IsCanonicalRegime as Prop := True."

[theorem.classification_pattern_unique]
id = "classification_pattern_unique"
cite_id = "IR.THEOREM.classification_pattern_unique"
name = "Classification pattern unique"
lean_symbol = "classification_pattern_unique"
source_module = "IdentityRegimes.Transform.LowerBound"
status = "proved"
description = "No two distinct profiles classify all transformations identically. If classify p t = classify q t for all t, then p = q. This is the injectivity result corresponding to the faithful embedding theorem in SE-300 Section 5."

