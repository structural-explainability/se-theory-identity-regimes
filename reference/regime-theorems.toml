[theorem.regime_application_admissible_of_neutral]
id = "regime_application_admissible_of_neutral"
cite_id = "IR.THEOREM.regime_application_admissible_of_neutral"
name = "Regime application admissible of neutral"
lean_symbol = "regime_application_admissible_of_neutral"
source_module = "IdentityRegimes.Theorems"
status = "proved"
description = "A neutral substrate supports admissible regime application. If S is neutral, then RegimeApplicationAdmissible S profile holds for any profile. Connects the neutral substrate layer directly to regime application."
