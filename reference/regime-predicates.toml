# ============================================================
# Regime Predicates
# se-theory-identity-regimes
# ============================================================

schema = "se-regime-predicate-registry-1"
repo = "se-theory-identity-regimes"
surface_module = "IdentityRegimes.Surface"
namespace = "IdentityRegimes"

[predicate.IsCanonicalRegime]
id = "IsCanonicalRegime"
cite_id = "IR.DEF.IsCanonicalRegime"
name = "Is canonical regime"
lean_symbol = "IsCanonicalRegime"
source_module = "IdentityRegimes.Vocab.Regimes"
description = "Predicate marking a regime as canonical. Intentionally minimal: defined as Prop := True, meaning every declared Regime qualifies. All six canonical regimes satisfy this predicate by all_regimes_canonical."

[predicate.NonCollapsing]
id = "NonCollapsing"
cite_id = "IR.DEF.NonCollapsing"
name = "Non-collapsing"
lean_symbol = "NonCollapsing"
source_module = "IdentityRegimes.Transform.NonCollapse"
description = "Two profiles are non-collapsing if they classify some transformation differently, inducing distinct equivalence relations on the representation space. All 36 pairs of distinct profiles in the derived regime set are non-collapsing."

[predicate.ProfileWellFormed]
id = "ProfileWellFormed"
cite_id = "IR.DEF.ProfileWellFormed"
name = "Profile well-formed"
lean_symbol = "ProfileWellFormed"
source_module = "IdentityRegimes.Profile.Core"
description = "A profile is well-formed when its parent regime is canonical. Since all regimes are canonical by IsCanonicalRegime, all profiles are well-formed."

[predicate.RequirementSatisfied]
id = "RequirementSatisfied"
cite_id = "IR.DEF.RequirementSatisfied"
name = "Requirement satisfied"
lean_symbol = "RequirementSatisfied"
source_module = "IdentityRegimes.Vocab.Requirements"
description = "Predicate asserting that a requirement is satisfied over a substrate. Intentionally minimal: defined as Prop := True. Downstream regime implementations may refine this with domain-specific conditions."

[predicate.RegimeApplicationAdmissible]
id = "RegimeApplicationAdmissible"
cite_id = "IR.DEF.RegimeApplicationAdmissible"
name = "Regime application admissible"
lean_symbol = "RegimeApplicationAdmissible"
source_module = "IdentityRegimes.Profile.Admissibility"
description = "A regime may be applied only over an admissible neutral substrate. Defined as Neutral S: the substrate must satisfy both extension stability and interpretive non-commitment. Connects identity regime theory to the neutral substrate layer."

[predicate.UnderSplitPressure]
id = "UnderSplitPressure"
cite_id = "IR.DEF.UnderSplitPressure"
name = "Under split pressure"
lean_symbol = "UnderSplitPressure"
source_module = "IdentityRegimes.Profile.Core"
description = "A profile is under split pressure when its split transformation is not none. OBL, OCC, and REC are not under split pressure. The six refined profiles (ENR_L, ENR_I, CTX_E, CTX_S, NOR_C, NOR_S) are under split pressure. Split pressure holds iff the parent regime is ENR, CTX, or NOR."
